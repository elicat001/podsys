<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PODStudio — POD 设计工作站</title>
<style>
  :root { --bg:#0f1115; --card:#181b22; --line:#2a2f3a; --fg:#e6e8ec; --mut:#9aa3b2; --acc:#4f8cff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, "Segoe UI", "Microsoft YaHei", sans-serif;
         background:var(--bg); color:var(--fg); }
  header { padding:20px 28px; border-bottom:1px solid var(--line); }
  header h1 { margin:0; font-size:18px; }
  header p { margin:4px 0 0; color:var(--mut); font-size:13px; }
  main { max-width:1100px; margin:0 auto; padding:24px; display:grid;
         grid-template-columns:320px 1fr; gap:24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; }
  label { display:block; font-size:13px; color:var(--mut); margin:12px 0 4px; }
  input, select { width:100%; padding:8px 10px; background:#0e1015; color:var(--fg);
                  border:1px solid var(--line); border-radius:8px; }
  .row { display:flex; gap:10px; }
  .row > div { flex:1; }
  button { margin-top:18px; width:100%; padding:11px; background:var(--acc); color:#fff;
           border:0; border-radius:9px; font-size:14px; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .results { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .results figure { margin:0; background:#0e1015; border:1px solid var(--line);
                    border-radius:10px; padding:10px; text-align:center; }
  .results img { max-width:100%; max-height:280px; border-radius:6px;
                 background:conic-gradient(#222 0 25%,#2b2b2b 0 50%) 0/20px 20px; }
  figcaption { font-size:12px; color:var(--mut); margin-top:8px; }
  figcaption a { color:var(--acc); }
  .hint { font-size:12px; color:var(--mut); margin-top:8px; line-height:1.6; }
  .empty { color:var(--mut); text-align:center; padding:60px 0; }
</style>
</head>
<body>
<header>
  <h1>PODStudio · POD 设计工作站 <span style="color:var(--mut);font-weight:400">v0.1 MVP</span></h1>
  <p>上传图片 → AI 抠图 → 提取印花 → 套图预览 → 导出生产文件
     · <a href="/editor.html" style="color:var(--acc)">DIY 编辑器</a>
     · <span id="balance" style="color:var(--acc)">余额 — 点</span></p>
</header>
<main>
  <section class="card">
    <label>① 上传商品图 / 设计图</label>
    <input type="file" id="file" accept="image/*" />

    <label>② 产品模板(套图)</label>
    <select id="template"></select>

    <label>③ 印花放大倍数</label>
    <select id="upscale">
      <option value="1">不放大 (1x)</option>
      <option value="2">2x (Lanczos)</option>
      <option value="4">4x</option>
    </select>

    <label>④ 生产文件尺寸</label>
    <div class="row">
      <div><input type="number" id="w" value="30" /><span class="hint">宽 cm</span></div>
      <div><input type="number" id="h" value="40" /><span class="hint">高 cm</span></div>
      <div><input type="number" id="dpi" value="300" /><span class="hint">DPI</span></div>
    </div>

    <button id="run">开始处理</button>
    <div class="hint" id="status"></div>

    <hr style="border-color:#2a2f3a;margin:18px 0" />
    <label>⚡ 一键工作流(采集→提取→裂变→套图→标题 串联)</label>
    <select id="workflow"></select>
    <button id="runwf">运行工作流</button>
    <div class="hint" id="wfstatus"></div>
  </section>

  <section class="card">
    <div id="results"><div class="empty">处理结果将显示在这里</div></div>

    <hr style="border-color:#2a2f3a;margin:20px 0" />
    <label>AI 文生图(gpt-image / image2)</label>
    <div class="row">
      <div style="flex:3"><input type="text" id="prompt" placeholder="描述你想生成的印花/设计…" /></div>
      <div style="flex:1"><button id="gen" style="margin-top:0">生成</button></div>
    </div>
    <div class="hint" id="genstatus"></div>
    <div id="genresult"></div>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);

// --- 访客自动鉴权:首次自动注册一个 guest,token 存 localStorage,所有请求带上 ---
async function ensureToken() {
  let tok = localStorage.getItem('pod_token');
  if (tok) return tok;
  const email = 'guest_' + Math.random().toString(36).slice(2, 10) + '@guest.local';
  const r = await fetch('/api/auth/register', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: 'guest-' + email }),
  });
  const d = await r.json();
  localStorage.setItem('pod_token', d.token);
  return d.token;
}
async function authHeaders() { return { Authorization: 'Bearer ' + (await ensureToken()) }; }

async function refreshBalance() {
  try {
    const r = await fetch('/api/billing/balance', { headers: await authHeaders() });
    if (r.ok) $('balance').textContent = '余额 ' + (await r.json()).credits + ' 点';
  } catch (e) {}
}

async function loadTemplates() {
  const r = await fetch('/api/templates');
  const list = await r.json();
  $('template').innerHTML = list.map(t => `<option value="${t.id}">${t.label}</option>`).join('');
}

$('run').onclick = async () => {
  const f = $('file').files[0];
  if (!f) { $('status').textContent = '请先选择一张图片'; return; }
  const fd = new FormData();
  fd.append('file', f);
  fd.append('template', $('template').value);
  fd.append('upscale', $('upscale').value);
  fd.append('width_cm', $('w').value);
  fd.append('height_cm', $('h').value);
  fd.append('dpi', $('dpi').value);

  $('run').disabled = true;
  $('status').textContent = '处理中…';
  try {
    const r = await fetch('/api/process', { method: 'POST', body: fd, headers: await authHeaders() });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    const d = await r.json();
    const m = d.production_meta;
    $('results').innerHTML = `
      <div class="results">
        <figure><img src="${d.print_url}" /><figcaption>提取的印花(透明底)</figcaption></figure>
        <figure><img src="${d.mockup_url}" /><figcaption>套图预览</figcaption></figure>
        <figure><img src="${d.production_url}" /><figcaption>
          生产文件 ${m.width_px}×${m.height_px}px @${m.dpi}DPI<br/>
          <a href="${d.production_url}" download>下载生产文件</a></figcaption></figure>
      </div>`;
    $('status').textContent = '完成 ✓  作业号 ' + d.job_id;
    refreshBalance();
  } catch (e) {
    $('status').textContent = '出错: ' + e.message;
  } finally {
    $('run').disabled = false;
  }
};

document.getElementById('gen').onclick = async () => {
  const p = document.getElementById('prompt').value.trim();
  if (!p) { document.getElementById('genstatus').textContent = '请输入描述'; return; }
  document.getElementById('genstatus').textContent = '生成中…';
  try {
    const fd = new FormData(); fd.append('prompt', p); fd.append('size', '1024x1024');
    const r = await fetch('/api/generate', { method: 'POST', body: fd, headers: await authHeaders() });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    const d = await r.json();
    document.getElementById('genresult').innerHTML =
      `<figure class="results"><img src="${d.image_url}" style="max-height:320px" /></figure>`;
    document.getElementById('genstatus').textContent = '完成 ✓ 作业号 ' + d.job_id;
    refreshBalance();
  } catch (e) { document.getElementById('genstatus').textContent = '出错: ' + e.message; }
};

async function loadWorkflows() {
  const r = await fetch('/api/workflows');
  const list = await r.json();
  $('workflow').innerHTML = list.map(w => `<option value="${w.id}" title="${w.desc}">${w.label}</option>`).join('');
}

async function pollJob(jid, headers) {
  for (let i = 0; i < 60; i++) {
    const r = await fetch('/api/jobs/' + jid, { headers });
    if (r.ok) {
      const j = await r.json();
      if (j.status === 'done') return j;
      if (j.status === 'error') throw new Error(j.error || '作业失败');
    }
    await new Promise(res => setTimeout(res, 800));
  }
  throw new Error('作业超时');
}

$('runwf').onclick = async () => {
  const f = $('file').files[0];
  if (!f) { $('wfstatus').textContent = '请先在上方选择一张图片'; return; }
  $('runwf').disabled = true;
  $('wfstatus').textContent = '工作流运行中…';
  try {
    const fd = new FormData();
    fd.append('file', f);
    fd.append('workflow_id', $('workflow').value);
    const headers = await authHeaders();
    const r = await fetch('/api/workflows/run', { method: 'POST', body: fd, headers });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    const { job_id } = await r.json();
    const done = await pollJob(job_id, headers);
    const imgs = (done.result.outputs || []).filter(u => /\.(png|jpg)$/i.test(u));
    $('results').innerHTML = '<div class="results">' +
      imgs.map(u => `<figure><img src="${u}" /><figcaption>${u.split('/').pop()}</figcaption></figure>`).join('') +
      '</div>';
    $('wfstatus').textContent = '完成 ✓ 步骤: ' + (done.result.steps_run || []).join(' → ');
    refreshBalance();
  } catch (e) {
    $('wfstatus').textContent = '出错: ' + e.message;
  } finally {
    $('runwf').disabled = false;
  }
};

loadTemplates();
loadWorkflows();
refreshBalance();
</script>
</body>
</html>
