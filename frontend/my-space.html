<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PODStudio — 我的空间</title>
<style>
  :root { --bg:#0f1115; --card:#181b22; --line:#2a2f3a; --fg:#e6e8ec; --mut:#9aa3b2; --acc:#4f8cff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, "Segoe UI", "Microsoft YaHei", sans-serif;
         background:var(--bg); color:var(--fg); }
  header { padding:20px 28px; border-bottom:1px solid var(--line); }
  header h1 { margin:0; font-size:18px; }
  header p { margin:4px 0 0; color:var(--mut); font-size:13px; }
  header a { color:var(--acc); text-decoration:none; }
  main { max-width:1000px; margin:0 auto; padding:24px; }
  .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:12px;
          padding:22px 18px; }
  .stat .num { font-size:32px; font-weight:600; color:var(--fg); }
  .stat .lbl { font-size:13px; color:var(--mut); margin-top:6px; }
  .stat.accent .num { color:var(--acc); }
  .nav { display:flex; gap:14px; margin-top:24px; flex-wrap:wrap; }
  .nav a { background:var(--card); border:1px solid var(--line); border-radius:10px;
           padding:12px 18px; color:var(--fg); text-decoration:none; font-size:14px; }
  .nav a:hover { border-color:var(--acc); }
  .hint { font-size:13px; color:var(--mut); margin-top:16px; }
</style>
</head>
<body>
<header>
  <h1>PODStudio · 我的空间</h1>
  <p><a href="/">← 返回首页</a> · 个人资源总览</p>
</header>
<main>
  <div class="cards" id="cards">
    <div class="hint">加载中…</div>
  </div>

  <div class="nav">
    <a href="/">首页 / 一键处理</a>
    <a href="/editor.html">DIY 编辑器</a>
    <a href="/workflow-editor.html">可视化工作流编辑器</a>
  </div>

  <div class="hint" id="status"></div>
</main>

<script>
// --- 访客自动鉴权(同 index.html):token 存 localStorage,所有请求带 Bearer ---
async function ensureToken() {
  let tok = localStorage.getItem('pod_token');
  if (tok) return tok;
  const email = 'guest_' + Math.random().toString(36).slice(2, 10) + '@guest.local';
  const r = await fetch('/api/auth/register', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: 'guest-' + email }),
  });
  const d = await r.json();
  localStorage.setItem('pod_token', d.token);
  return d.token;
}
async function authHeaders() { return { Authorization: 'Bearer ' + (await ensureToken()) }; }

const CARDS = [
  { key: 'credits',       label: '余额(点)', accent: true },
  { key: 'assets',        label: '素材' },
  { key: 'products',      label: '商品' },
  { key: 'shops',         label: '店铺' },
  { key: 'jobs',          label: '作业' },
  { key: 'collect_tasks', label: '采集任务' },
];

async function loadOverview() {
  try {
    const r = await fetch('/api/me/overview', { headers: await authHeaders() });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    const d = await r.json();
    document.getElementById('cards').innerHTML = CARDS.map(c => `
      <div class="stat${c.accent ? ' accent' : ''}">
        <div class="num">${d[c.key] ?? 0}</div>
        <div class="lbl">${c.label}</div>
      </div>`).join('');
  } catch (e) {
    document.getElementById('status').textContent = '加载失败: ' + e.message;
  }
}

loadOverview();
</script>
</body>
</html>
