<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PODStudio · 视频生成</title>
<style>
  :root{--bg:#0f1115;--card:#181b22;--line:#2a2f3a;--fg:#e6e8ec;--mut:#9aa3b2;--acc:#4f8cff}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg)}
  header{padding:16px 24px;border-bottom:1px solid var(--line)}
  header a{color:var(--acc);font-size:13px}
  main{max-width:900px;margin:0 auto;padding:24px;display:grid;grid-template-columns:320px 1fr;gap:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px}
  label{display:block;font-size:13px;color:var(--mut);margin:12px 0 4px}
  input,select{width:100%;padding:8px 10px;background:#0e1015;color:var(--fg);border:1px solid var(--line);border-radius:8px}
  button{margin-top:16px;width:100%;padding:11px;background:var(--acc);color:#fff;border:0;border-radius:9px;cursor:pointer}
  button:disabled{opacity:.5}
  .hint{font-size:12px;color:var(--mut);margin-top:8px;line-height:1.6}
  img{max-width:100%;border:1px solid var(--line);border-radius:8px;background:#0e1015}
  .empty{color:var(--mut);text-align:center;padding:60px 0}
</style>
</head>
<body>
<header><b>PODStudio · 视频生成</b> <span id="balance" style="color:var(--acc);float:right">余额 — 点</span>
  <a href="/" style="margin-left:12px">← 工作站</a></header>
<main>
  <section class="card">
    <label>① 商品图 / 套图(可选第二张做轮播)</label>
    <input type="file" id="file" accept="image/*" />
    <input type="file" id="file2" accept="image/*" style="margin-top:6px" />
    <label>② 风格</label>
    <select id="style"><option value="kenburns">运镜推近 (Ken-Burns)</option><option value="slideshow">多图轮播</option></select>
    <label>③ 画幅</label>
    <select id="aspect"><option value="square">1:1 方形</option><option value="portrait">9:16 竖版 (TK)</option><option value="landscape">16:9 横版</option></select>
    <label>④ 文案(叠加底部,可空)</label>
    <input type="text" id="text" placeholder="New favorite find!" />
    <button id="run">生成展示视频</button>
    <div class="hint" id="status"></div>
  </section>
  <section class="card"><div id="result"><div class="empty">生成的动态视频(GIF)将显示在这里</div></div></section>
</main>
<script>
const $ = (id) => document.getElementById(id);
async function ensureToken(){
  let t=localStorage.getItem('pod_token'); if(t) return t;
  const email='guest_'+Math.random().toString(36).slice(2,10)+'@guest.local';
  const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:'guest-'+email})});
  t=(await r.json()).token; localStorage.setItem('pod_token',t); return t;
}
async function authHeaders(){return {Authorization:'Bearer '+(await ensureToken())};}
async function refreshBalance(){try{const r=await fetch('/api/billing/balance',{headers:await authHeaders()});if(r.ok)$('balance').textContent='余额 '+(await r.json()).credits+' 点';}catch(e){}}
$('run').onclick=async()=>{
  const f=$('file').files[0]; if(!f){$('status').textContent='请先选择商品图';return;}
  $('run').disabled=true; $('status').textContent='生成中…';
  try{
    const fd=new FormData(); fd.append('file',f);
    if($('file2').files[0]) fd.append('file2',$('file2').files[0]);
    fd.append('style',$('style').value); fd.append('aspect',$('aspect').value); fd.append('text',$('text').value);
    const r=await fetch('/api/video/generate',{method:'POST',body:fd,headers:await authHeaders()});
    if(!r.ok) throw new Error((await r.json()).detail||r.statusText);
    const d=await r.json();
    $('result').innerHTML=`<img src="${d.video_url}" /><div class="hint">${d.width}×${d.height} · ${d.frames} 帧 · <a href="${d.video_url}" download style="color:var(--acc)">下载 GIF</a></div>`;
    $('status').textContent='完成 ✓ 作业 '+d.job_id; refreshBalance();
  }catch(e){$('status').textContent='出错: '+e.message;}finally{$('run').disabled=false;}
};
refreshBalance();
</script>
</body>
</html>
