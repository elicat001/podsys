<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 280px; margin: 0; padding: 14px; font: 13px/1.6 -apple-system, "Microsoft YaHei", sans-serif; background: #1c1c20; color: #eee; }
    h1 { font-size: 15px; margin: 0 0 10px; }
    .row { margin: 8px 0; }
    .ok { color: #5fd07a; } .bad { color: #ff7a6b; } .mut { color: #9a9a9a; font-size: 12px; }
    a.btn { display: inline-block; padding: 7px 12px; border: none; border-radius: 8px; cursor: pointer;
      background: linear-gradient(135deg,#ff7a18,#ff5d3b); color: #fff; font-weight: 700; text-decoration: none; font-size: 13px; }
    select { width: 100%; padding: 6px; border-radius: 7px; background: #2a2a30; color: #eee; border: 1px solid #3a3a42; }
    ol { padding-left: 18px; margin: 8px 0; } li { margin: 3px 0; font-size: 12px; color: #cfcfcf; }
  </style>
</head>
<body>
  <h1>🦏 PODStudio 采集助手</h1>
  <div class="row" id="login">登录状态:检测中…</div>
  <div class="row">
    <div class="mut">PODStudio 地址</div>
    <select id="api">
      <option value="https://pod.kejing.online">线上 pod.kejing.online</option>
      <option value="http://localhost:10000">本地 localhost:10000</option>
    </select>
  </div>
  <div class="row"><a class="btn" id="open" target="_blank">打开 PODStudio 登录 →</a></div>
  <ol>
    <li>先在 PODStudio 网站登录(本插件读取登录态)。</li>
    <li>打开 Temu / Amazon / Shopee / 美客多 / TikTok 商品页,出现采集悬浮球。</li>
    <li>点悬浮球展开 →「全部采集本页」,或悬停某图点「采集此商品」。</li>
    <li>采集进「采集箱」→ 去采集页勾选「同步」入「找图」(同步时自动侵权查重)。</li>
  </ol>
  <div class="mut">仅用于已获授权 / 自有内容场景。</div>
  <script src="popup.js"></script>
</body>
</html>
